<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Assignment 0, Vector Library </title>
    </head>

    <body onload="main()">
        <canvas id="example" width="400" height="400">
        Please use a browser that supports "canvas"
        </canvas>
        <div>
            <label for="v1x">V1 x:</label>
            <input type="number" id="v1x" min="-400" max="400" />
            <label for="v1y">y:</label>
            <input type="number" id="v1y" min="-400" max="400" />
        </div>
        <div>
            <label for="v2x">V2 x:</label>
            <input type="number" id="v2x" min="-400" max="400" />
            <label for="v2y">y:</label>
            <input type="number" id="v2y" min="-400" max="400" />
        </div>
        <div>
            <button onclick="handleDrawEvent()">Draw</button>
        </div>
        <div>
            <label for="op-select">Operation:</label>
            <select name="ops" id="op-select">
            <option value="add">Add</option>
            <option value="sub">Subtract</option>
            <option value="mul">Multiply</option>
            <option value="div">Divide</option>
            <option value="mag">Magnitude </option>
            <option value="nor">Normalize </option>
            <option value="ang">Angle between </option>
            <option value="are">Area </option>
            </select>
            <label for="scal">Scalar:</label>
            <input type="number" id="sca" min="-400" max="400" />
        </div>
        <div>
            <button onclick="handleDrawOperationEvent()">Draw</button>
        </div>
        <script src="lib/cuon-matrix-cse160.js"></script>
        <script src="asg0.js"></script>
</html>
